<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel de Retiros</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap');

:root {
  --bg: #14181A;
  --surface: #1E2427;
  --surface-alt: #262D30;
  --border: #333B3E;
  --accent: #F2B134;
  --text: #F5F3EE;
  --text-muted: #9AA5A9;
}
* { box-sizing: border-box; }
body {
  margin: 0;
  background: var(--bg);
  font-family: 'Inter', sans-serif;
  color: var(--text);
  min-height: 100vh;
}
.header {
  border-bottom: 1px solid var(--border);
  padding: 20px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 10px;
}
.header-left { display: flex; align-items: center; gap: 12px; }
.logo {
  background: var(--accent);
  border-radius: 4px;
  width: 38px; height: 38px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
}
.title {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 24px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin: 0; line-height: 1;
}
.subtitle {
  color: var(--text-muted);
  font-family: 'IBM Plex Mono', monospace;
  font-size: 12px;
  margin-top: 4px;
  text-transform: capitalize;
}
.tabbar {
  border-bottom: 1px solid var(--border);
  display: flex;
  overflow-x: auto;
  padding: 0 24px;
}
.tab-btn {
  background: none; border: none;
  color: var(--text-muted);
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 14px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  font-weight: 500;
  padding: 12px 16px;
  cursor: pointer;
  border-bottom: 2px solid transparent;
  white-space: nowrap;
  display: flex; align-items: center; gap: 6px;
}
.tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
.badge {
  background: var(--surface-alt); color: var(--text);
  font-size: 11px; padding: 1px 6px; border-radius: 4px;
}
.content { padding: 20px 24px; }
.panel {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 18px 20px;
  margin-bottom: 22px;
}
.panel h2 {
  font-family: 'Barlow Condensed', sans-serif;
  text-transform: uppercase;
  font-size: 18px;
  font-weight: 600;
  margin: 0 0 12px 0;
}
.form-row { display: flex; flex-wrap: wrap; gap: 12px; align-items: flex-end; }
.field { display: flex; flex-direction: column; gap: 4px; }
.field label {
  color: var(--text-muted);
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  text-transform: uppercase;
}
.day-checks { display: flex; flex-wrap: wrap; gap: 6px; }
.day-check {
  display: flex; align-items: center; gap: 4px;
  background: var(--surface-alt); border: 1px solid var(--border); border-radius: 4px;
  padding: 6px 8px; font-size: 12px; color: var(--text); cursor: pointer; white-space: nowrap;
}
.day-check input { margin: 0; accent-color: var(--accent); }
input, select {
  background: var(--surface-alt);
  border: 1px solid var(--border);
  color: var(--text);
  border-radius: 4px;
  padding: 8px 10px;
  font-family: 'Inter', sans-serif;
  font-size: 14px;
  outline: none;
}
button {
  cursor: pointer; font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 500;
  border-radius: 4px; border: 1px solid transparent; padding: 9px 14px;
  display: inline-flex; align-items: center; gap: 6px;
}
.btn-accent { background: var(--accent); color: var(--bg); border: none; }
.btn-ghost { background: var(--surface-alt); color: var(--text); border: 1px solid var(--border); }
.btn-outline { background: transparent; color: var(--text-muted); border: 1px solid var(--border); }
.btn-icon { background: none; border: none; color: var(--text-muted); padding: 4px; }
button:disabled { opacity: 0.5; cursor: not-allowed; }
.list { display: flex; flex-direction: column; gap: 8px; }
.row-card {
  background: var(--surface); border: 1px solid var(--border); border-radius: 6px;
  padding: 10px 14px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
}
.dot { width: 8px; height: 8px; border-radius: 999px; flex-shrink: 0; }
.row-main { flex: 1; min-width: 180px; }
.row-name { font-size: 14px; font-weight: 500; margin: 0; }
.row-sub { color: var(--text-muted); font-family: 'IBM Plex Mono', monospace; font-size: 12px; margin: 2px 0 0 0; }
.empty {
  border: 1px dashed var(--border); border-radius: 8px; color: var(--text-muted);
  padding: 32px; text-align: center; font-size: 14px;
}
.section-title {
  font-family: 'Barlow Condensed', sans-serif; text-transform: uppercase; font-size: 18px; font-weight: 600; margin: 0;
}
.toolbar { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; margin-bottom: 14px; }
.chip { font-family: 'IBM Plex Mono', monospace; font-size: 11px; padding: 2px 6px; border-radius: 4px; white-space: nowrap; }
.routes-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 16px; }
.ticket { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
.ticket-top { background: var(--accent); height: 5px; }
.ticket-head { padding: 12px 16px; border-bottom: 1px dashed var(--border); }
.ticket-head .drv { font-family: 'Barlow Condensed', sans-serif; font-size: 18px; text-transform: uppercase; font-weight: 600; margin: 0; }
.ticket-head .cnt { color: var(--text-muted); font-family: 'IBM Plex Mono', monospace; font-size: 12px; margin: 2px 0 0 0; }
.ticket-body { padding: 12px 16px; display: flex; flex-direction: column; gap: 10px; }
.stop { display: flex; align-items: flex-start; gap: 8px; }
.stop-num { color: var(--text-muted); font-family: 'IBM Plex Mono', monospace; font-size: 12px; width: 16px; flex-shrink: 0; margin-top: 1px; }
.stop-info p { margin: 0; }
.stop-name { font-size: 14px; }
.stop-addr { color: var(--text-muted); font-family: 'IBM Plex Mono', monospace; font-size: 11px; }
.stop-zone { margin-left: auto; font-family: 'IBM Plex Mono', monospace; font-size: 10px; padding: 2px 6px; border-radius: 4px; white-space: nowrap; }
.save-note { color: #E4785C; font-family: 'IBM Plex Mono', monospace; font-size: 12px; }

/* ---- Mapa ---- */
.map-controls { display: flex; flex-wrap: wrap; gap: 12px; align-items: flex-end; margin-bottom: 14px; }
#map { width: 100%; height: 460px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface-alt); }
.pin {
  width: 22px; height: 22px; border-radius: 50% 50% 50% 0;
  transform: rotate(-45deg);
  border: 2px solid var(--bg);
  box-shadow: 0 1px 4px rgba(0,0,0,0.5);
  display: flex; align-items: center; justify-content: center;
}
.pin.selected { border: 2px solid var(--accent); box-shadow: 0 0 0 3px rgba(242,177,52,0.4); }
.pin-label { transform: rotate(45deg); font-size: 10px; font-weight: 700; color: #14181A; font-family: 'IBM Plex Mono', monospace; }
.map-status { color: var(--text-muted); font-family: 'IBM Plex Mono', monospace; font-size: 12px; margin-bottom: 8px; }
.selection-bar {
  position: sticky; bottom: 0; left: 0; right: 0;
  background: var(--surface); border-top: 1px solid var(--border);
  padding: 12px 20px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
  margin: 16px -24px -20px -24px;
  border-radius: 0 0 8px 8px;
}
.selection-bar .count { font-family: 'Barlow Condensed', sans-serif; font-size: 15px; text-transform: uppercase; font-weight: 600; }
@media (max-width: 600px) {
  .header, .tabbar, .content { padding-left: 14px; padding-right: 14px; }
}

/* ---- Login ---- */
#login-overlay {
  position: fixed; inset: 0; z-index: 9999;
  background: var(--bg);
  display: flex; align-items: center; justify-content: center;
  padding: 20px;
}
.login-card {
  background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
  padding: 32px 28px; width: 100%; max-width: 360px;
}
.login-card .logo { margin: 0 auto 16px auto; }
.login-card h1 {
  font-family: 'Barlow Condensed', sans-serif; text-transform: uppercase;
  font-size: 22px; font-weight: 600; margin: 0 0 4px 0; text-align: center;
}
.login-card p.sub { color: var(--text-muted); font-family: 'IBM Plex Mono', monospace; font-size: 12px; text-align: center; margin: 0 0 22px 0; }
.login-card label { color: var(--text-muted); font-family: 'IBM Plex Mono', monospace; font-size: 11px; text-transform: uppercase; display: block; margin-bottom: 4px; }
.login-card input { width: 100%; margin-bottom: 14px; }
.login-card button { width: 100%; justify-content: center; padding: 11px; font-size: 15px; }
.login-error { color: #E4785C; font-size: 13px; margin: 4px 0 12px 0; min-height: 16px; }
#app-wrap { display: none; }
</style>
</head>
<body>

<div id="login-overlay">
  <div class="login-card">
    <div class="logo">🚚</div>
    <h1>Panel de Retiros</h1>
    <p class="sub">Acceso restringido</p>
    <form id="login-form">
      <label for="login-email">Email</label>
      <input type="email" id="login-email" autocomplete="username" placeholder="tu@correo.com" required>
      <label for="login-pass">Contraseña</label>
      <input type="password" id="login-pass" autocomplete="current-password" placeholder="••••••••" required>
      <div class="login-error" id="login-error"></div>
      <button type="submit" class="btn-accent" id="login-btn">Entrar</button>
    </form>
  </div>
</div>

<div id="app-wrap">
<div class="header">
  <div class="header-left">
    <div class="logo">🚚</div>
    <div>
      <p class="title">Panel de Retiros</p>
      <p class="subtitle" id="today-date"></p>
    </div>
  </div>
  <div style="display:flex; align-items:center; gap:10px;">
    <button class="btn-ghost" id="export-data" style="font-size:12px; padding:6px 10px;">⬇ Exportar datos</button>
    <button class="btn-ghost" id="import-data" style="font-size:12px; padding:6px 10px;">⬆ Importar datos</button>
    <input type="file" id="import-file" accept="application/json,.json" style="display:none;">
    <span class="save-note" id="cloud-note" style="color: var(--text-muted);">Conectando...</span>
    <span class="save-note" id="save-note" style="display:none;">Guardado local en este navegador</span>
    <button class="btn-outline" id="logout-btn" style="font-size:12px; padding:6px 10px;">Salir</button>
  </div>
</div>

<div class="tabbar" id="tabbar"></div>
<div class="content" id="content"></div>
</div>

function zoneColor(zona) {
  if (!zona) return "#5B6568";
  let hash = 0;
  for (let i = 0; i < zona.length; i++) hash = zona.charCodeAt(i) + ((hash << 5) - hash);
  return ZONE_COLORS[Math.abs(hash) % ZONE_COLORS.length];
}
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 7); }

function parseLatLng(text) {
  if (!text || !text.trim()) return [undefined, undefined];
  const parts = text.split(",").map((s) => parseFloat(s.trim()));
  if (parts.length === 2 && !isNaN(parts[0]) && !isNaN(parts[1])) return parts;
  return [undefined, undefined];
}

const DIAS_SEMANA = ["Lunes", "Martes", "Miércoles", "Jueves", "Viernes", "Sábado", "Domingo"];

function normalizarTexto(s) {
  return (s || "").toLowerCase().normalize("NFD").replace(/[̀-ͯ]/g, "");
}

function inferTurno(diasText) {
  const t = (diasText || "").toLowerCase();
  const tieneManana = t.includes("mañana") || t.includes("manana") || t.includes(" am") || t.includes("8 hs") || t.includes("9 a") || t.includes("10 a") || t.includes("11 a");
  const tieneTarde = t.includes("tarde") || t.includes(" pm") || t.includes("14 a") || t.includes("15 a") || t.includes("16 a");
  if (tieneManana && tieneTarde) return "Ambos";
  if (tieneManana) return "Mañana";
  if (tieneTarde) return "Tarde";
  return "";
}

function inferDiasSemana(diasText) {
  const t = normalizarTexto(diasText);
  const aPedido = t.includes("pedido");
  if (t.includes("todos los dias") || t.includes("lunes a viernes") || t.includes("lunes a sabado")) {
    if (t.includes("sabado")) return { diasSemana: DIAS_SEMANA.slice(0, 6), aPedido };
    return { diasSemana: DIAS_SEMANA.slice(0, 5), aPedido };
  }
  const encontrados = DIAS_SEMANA.filter((d) => t.includes(normalizarTexto(d)));
  return { diasSemana: encontrados, aPedido };
}

function seedData() {
  return {
    drivers: SEED_DRIVER_NAMES.map((nombre) => ({ id: uid(), nombre })),
    fixedAddresses: SEED_FIXED.map((f) => ({ ...f, id: uid() })),
    pickups: [],
  };
}

function migrarTurnos(d) {
  d.fixedAddresses.forEach((f) => {
    if (f.turno === undefined || f.turno === null) f.turno = inferTurno(f.dias + " " + (f.horario || ""));
    if (f.diasSemana === undefined) {
      const inferido = inferDiasSemana(f.dias);
      f.diasSemana = inferido.diasSemana;
      if (f.aPedido === undefined) f.aPedido = inferido.aPedido;
    }
    if (f.aPedido === undefined) f.aPedido = false;
  });
  return d;
}

function loadFromLocalStorage() {
  let d;
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) d = JSON.parse(raw);
  } catch (e) { /* localStorage no disponible o vacío */ }
  if (!d) d = seedData();
  return migrarTurnos(d);
}

let data = { drivers: [], fixedAddresses: [], pickups: [] };
let dataReady = false;
let tab = "mapa";

async function initData() {
  const usingFirebase = tryInitFirebase();
  const cloudNote = document.getElementById("cloud-note");
  if (!usingFirebase) {
    data = loadFromLocalStorage();
    dataReady = true;
    if (cloudNote) cloudNote.textContent = "Guardado solo en este navegador (Firebase no configurado)";
    render();
    return;
  }
  try {
    const docRef = db.collection("panelRetiros").doc("data");
    const snap = await docRef.get();
    if (snap.exists) {
      applyCloudPayload(snap.data());
    } else {
      data = seedData();
      await docRef.set(buildCloudPayload());
    }
    dataReady = true;
    if (cloudNote) cloudNote.textContent = "Sincronizado con la nube ☁️";
    render();
    // escuchar cambios hechos desde otros dispositivos y refrescar en vivo
    unsubscribeSnapshot = docRef.onSnapshot((doc) => {
      if (!doc.exists) return;
      if (doc.metadata.hasPendingWrites) return; // ignorar el eco de nuestro propio guardado
      applyCloudPayload(doc.data());
      render();
    });
  } catch (e) {
    console.error("Firebase falló, uso guardado local:", e);
    data = loadFromLocalStorage();
    dataReady = true;
    if (cloudNote) cloudNote.textContent = "No se pudo conectar a la nube — guardando solo local";
    render();
  }
}

let saveTimer = null;

function buildCloudPayload() {
  return {
    drivers: data.drivers,
    fixedAddresses: data.fixedAddresses,
    pickups: data.pickups,
    geocode: geoCache || {},
  };
}

function applyCloudPayload(payload) {
  data = migrarTurnos({
    drivers: payload.drivers || [],
    fixedAddresses: payload.fixedAddresses || [],
    pickups: payload.pickups || [],
  });
  // incorporar las ubicaciones que vengan de la nube a la caché local
  if (payload.geocode && typeof payload.geocode === "object") {
    geoCache = Object.assign({}, geoCache, payload.geocode);
    saveGeoCache(geoCache);
  }
}

function save() {
  // guardado local inmediato, siempre como respaldo
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    document.getElementById("save-note").style.display = "none";
  } catch (e) {
    const note = document.getElementById("save-note");
    note.style.display = "inline";
    note.textContent = "No se pudo guardar (localStorage bloqueado)";
  }
  if (!firebaseReady) return;
  // debounce: agrupa cambios rápidos seguidos en una sola escritura a la nube
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => {
    db.collection("panelRetiros").doc("data").set(buildCloudPayload()).catch((e) => {
      console.error("Error guardando en la nube:", e);
    });
  }, 400);
}

function autoAssign() {
  if (data.drivers.length === 0) return;
  const byZone = {};
  data.pickups.forEach((p) => {
    const key = (p.zona || "Sin zona").trim();
    if (!byZone[key]) byZone[key] = [];
    byZone[key].push(p);
  });
  const orderedZones = Object.keys(byZone).sort((a, b) => a.localeCompare(b));
  const ordered = orderedZones.flatMap((z) => byZone[z]);
  const n = data.drivers.length;
  const total = ordered.length;
  const base = Math.floor(total / n);
  const extra = total % n;
  let idx = 0;
  data.drivers.forEach((d, i) => {
    const size = base + (i < extra ? 1 : 0);
    for (let k = 0; k < size; k++) {
      if (ordered[idx]) ordered[idx].driverId = d.id;
      idx++;
    }
  });
  save(); render();
}

function printAllRoutes() {
  const today = new Date().toLocaleDateString("es-AR", { weekday: "long", day: "numeric", month: "long" });

    .map((d) => ({ d, pickups: data.pickups.filter((p) => p.driverId === d.id).sort((a, b) => (a.zona || "").localeCompare(b.zona || "")) }))

const HISTORIAL_LOCAL_KEY = "panel-retiros-historial-v1";

function fechaHoyISO() {
  const now = new Date();
  const y = now.getFullYear();
  const m = String(now.getMonth() + 1).padStart(2, "0");
  const d = String(now.getDate()).padStart(2, "0");
  return `${y}-${m}-${d}`;
}

function buildSnapshot() {
  const fecha = fechaHoyISO();
  const fechaLegible = new Date().toLocaleDateString("es-AR", { weekday: "long", day: "numeric", month: "long", year: "numeric" });
  const rutas = data.drivers.map((d) => ({
    driverNombre: d.nombre,
    pickups: data.pickups.filter((p) => p.driverId === d.id).map((p) => ({ nombre: p.nombre, direccion: p.direccion, zona: p.zona, turno: p.turno || "" })),
  })).filter((r) => r.pickups.length > 0);
  const sinAsignar = data.pickups.filter((p) => !p.driverId).map((p) => ({ nombre: p.nombre, direccion: p.direccion, zona: p.zona }));
  return { fecha, fechaLegible, rutas, sinAsignar, guardadoEn: Date.now() };
}

async function guardarHistorialHoy() {
  const snap = buildSnapshot();
  if (snap.rutas.length === 0 && snap.sinAsignar.length === 0) {
    alert("No hay retiros cargados hoy para guardar en el historial.");
    return;
  }
  try {
    if (firebaseReady) {
      await db.collection("historial").doc(snap.fecha).set(snap);
    } else {
      const raw = localStorage.getItem(HISTORIAL_LOCAL_KEY);
      const all = raw ? JSON.parse(raw) : {};
      all[snap.fecha] = snap;
      localStorage.setItem(HISTORIAL_LOCAL_KEY, JSON.stringify(all));
    }
    alert(`Historial de hoy (${snap.fechaLegible}) guardado. Podés consultarlo en la pestaña "Historial".`);
  } catch (e) {
    console.error(e);
    alert("No se pudo guardar el historial. Revisá la conexión.");
  }
}

async function listarHistorial() {
  if (firebaseReady) {
    const q = await db.collection("historial").orderBy("fecha", "desc").limit(60).get();
    return q.docs.map((doc) => doc.data());
  }
  const raw = localStorage.getItem(HISTORIAL_LOCAL_KEY);
  const all = raw ? JSON.parse(raw) : {};
  return Object.values(all).sort((a, b) => b.fecha.localeCompare(a.fecha));
}

const GEOCODE_CACHE_KEY = "panel-retiros-geocode-v2";
function loadGeoCache() {
  try { return JSON.parse(localStorage.getItem(GEOCODE_CACHE_KEY)) || {}; } catch (e) { return {}; }
}
function saveGeoCache(cache) {
  try { localStorage.setItem(GEOCODE_CACHE_KEY, JSON.stringify(cache)); } catch (e) {}
}
let geoCache = loadGeoCache();

// Caja aproximada del Gran Buenos Aires + zona norte extendida, para sesgar
// los resultados de búsqueda y evitar que "Beccar" o "San Martin" resuelvan
// en otra parte del mundo. left,top,right,bottom (lon,lat,lon,lat)
const GBA_VIEWBOX = "-59.3,-34.0,-57.9,-35.3";

async function geocodeQuery(query) {
  const key = query.trim().toLowerCase();
  if (geoCache[key] !== undefined) return geoCache[key];
  try {
    const q = encodeURIComponent(query);
    const url = `https://nominatim.openstreetmap.org/search?format=json&limit=1&countrycodes=ar&viewbox=${GBA_VIEWBOX}&q=${q}`;
    const res = await fetch(url);
    const json = await res.json();
    if (json && json[0]) {
      const coords = [parseFloat(json[0].lat), parseFloat(json[0].lon)];
      geoCache[key] = coords;
      saveGeoCache(geoCache);
      syncGeocodeToCloud();
      return coords;
    }
    geoCache[key] = null;
    saveGeoCache(geoCache);
    syncGeocodeToCloud();
  } catch (e) { /* sin conexión o falló la búsqueda */ }
  return null;
}

// Sube la caché de ubicaciones a la nube (con debounce) para que otros
// dispositivos no tengan que volver a calcular los mismos pines.
let geoSyncTimer = null;
function syncGeocodeToCloud() {
  if (!firebaseReady) return;
  clearTimeout(geoSyncTimer);
  geoSyncTimer = setTimeout(() => {
    db.collection("panelRetiros").doc("data")
      .set({ geocode: geoCache }, { merge: true })
      .catch((e) => console.error("Error sincronizando ubicaciones:", e));
  }, 1500);
}

// Intenta primero con la dirección completa (más precisa), y si no la
// encuentra cae a geocodificar solo la localidad (menos preciso pero
// casi siempre resuelve algo).
async function geocodeForPickup(p) {
  if (typeof p.lat === "number" && typeof p.lng === "number") return { coords: [p.lat, p.lng], precise: true };
  if (p.direccion) {
    const full = await geocodeQuery(`${p.direccion}, ${p.zona || ""}, Argentina`);
    if (full) return { coords: full, precise: true };
  }
  if (p.zona) {
    const approx = await geocodeQuery(`${p.zona}, Buenos Aires, Argentina`);
    if (approx) return { coords: approx, precise: false };
  }
  return null;
}

// jitter determinístico para separar pines de una misma localidad
function jitter(seedStr) {
  let hash = 0;
  for (let i = 0; i < seedStr.length; i++) hash = seedStr.charCodeAt(i) + ((hash << 5) - hash);
  const a = Math.abs(hash);
  const dx = ((a % 1000) / 1000 - 0.5) * 0.02;
  const dy = (((a >> 10) % 1000) / 1000 - 0.5) * 0.02;
  return [dx, dy];
}

const BA_CENTER = [-34.49, -58.62]; // zona norte del GBA

function matchesDay(f, day) {
  return Array.isArray(f.diasSemana) && f.diasSemana.includes(day);
}

function matchesTurno(f, turno) {
  if (turno === "Todos" || !turno) return true;
  if (!f.turno || f.turno === "Ambos") return true; // sin turno definido: no lo excluimos
  return f.turno === turno;
}

function cargarDia(day, turno) {
  const toAdd = data.fixedAddresses.filter((f) => matchesDay(f, day) && matchesTurno(f, turno));
  const already = new Set(data.pickups.map((p) => p.fixedId).filter(Boolean));
  let added = 0;
  toAdd.forEach((f) => {
    if (already.has(f.id)) return;
    data.pickups.push({ id: uid(), nombre: f.nombre, direccion: f.direccion, zona: f.zona, driverId: null, fixedId: f.id, lat: f.lat, lng: f.lng, turno: f.turno || "" });
    added++;
  });
  save();
  render();
  const status = document.getElementById("map-status");
  const turnoTxt = turno && turno !== "Todos" ? ` (turno ${turno.toLowerCase()})` : "";
  if (status) status.textContent = `Se cargaron ${added} direcciones fijas de ${day}${turnoTxt}. (${toAdd.length - added} ya estaban en la lista de hoy)`;
}

function diasResumenTexto(f) {
  const dias = f.diasSemana || [];
  let txt = dias.length === 7 ? "Todos los días" : dias.map((d) => d.slice(0, 3)).join(",");
  if (f.aPedido) txt = txt ? txt + " + a pedido" : "A pedido";
  return txt;
}

async function initMap() {
  if (leafletMap) return;
  leafletMap = L.map("map", { scrollWheelZoom: true }).setView(BA_CENTER, 11);
  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
    attribution: "&copy; OpenStreetMap contributors",
    maxZoom: 18,
  }).addTo(leafletMap);
  markerLayer = L.layerGroup().addTo(leafletMap);
}

function makeDivIcon(color, selected) {
  return L.divIcon({
    className: "",
    html: `<div class="pin ${selected ? "selected" : ""}" style="background:${color};"></div>`,
    iconSize: [22, 22],
    iconAnchor: [11, 22],
  });
}

async function updateMapMarkers() {
  await initMap();
  markerLayer.clearLayers();
  refreshMapButtonsState();
  updateMapRoutes();
  const status = document.getElementById("pin-count-status");
  const pendientes = data.pickups.filter((p) => !p.driverId);
  if (status) status.textContent = `Ubicando ${pendientes.length} retiro(s) sin asignar en el mapa...`;

  const bounds = [];
  let sinUbicar = 0;
  for (const p of pendientes) {
    if (!p.zona && !(typeof p.lat === "number")) { sinUbicar++; continue; } // sin zona ni coordenadas manuales
    const result = await geocodeForPickup(p);
    if (!result) { sinUbicar++; continue; }
    let [lat, lng] = result.coords;
    if (!result.precise) {
      const [dx, dy] = jitter(p.id);
      lat += dx; lng += dy;
    }
    const color = zoneColor(p.zona);
    const marker = L.marker([lat, lng], { icon: makeDivIcon(color, selectedIds.has(p.id)) });
    marker.bindTooltip(`${p.nombre}${p.direccion ? " — " + p.direccion : ""}${p.turno ? " · " + p.turno : ""}${result.precise ? "" : " (ubicación aproximada)"}`);
    marker.on("click", () => toggleSelect(p.id));
    marker.addTo(markerLayer);
    bounds.push([lat, lng]);
  }
  if (bounds.length > 0) leafletMap.fitBounds(bounds, { padding: [30, 30], maxZoom: 14 });
  if (status) {
    const asignados = data.pickups.length - pendientes.length;
    status.textContent = `${bounds.length} retiro(s) sin asignar en el mapa` + (sinUbicar > 0 ? ` · ${sinUbicar} sin ubicar` : "") + (asignados > 0 ? ` · ${asignados} ya asignado(s) (ver abajo en Rutas)` : "");
  }
  refreshMapButtonsState();
  updateSelectionBar();
}

function refreshMapButtonsState() {
  const hasPickups = data.pickups.length > 0;
  const clearMapBtn = document.getElementById("clear-map");
  const clearAssignBtn = document.getElementById("clear-assignments-map");
  if (clearMapBtn) clearMapBtn.disabled = !hasPickups;
  if (clearAssignBtn) clearAssignBtn.disabled = !hasPickups;
}

function toggleSelect(pickupId) {
  if (selectedIds.has(pickupId)) selectedIds.delete(pickupId);
  else selectedIds.add(pickupId);
  updateMapMarkers();
}

function updateSelectionBar() {
  const bar = document.getElementById("selection-bar");
  const count = document.getElementById("sel-count");
  if (!bar || !count) return;
  if (selectedIds.size > 0) {
    bar.style.display = "flex";
    count.textContent = `${selectedIds.size} seleccionado${selectedIds.size === 1 ? "" : "s"}`;
  } else {
    bar.style.display = "none";
  }
}

function assignSelected(driverId) {
  if (!driverId || selectedIds.size === 0) return;
  data.pickups.forEach((p) => {
    if (selectedIds.has(p.id)) p.driverId = driverId;
  });
  selectedIds.clear();
  save();
  updateMapMarkers();
  render();
}

let mapPanelReady = false;

function render() {
  renderTabbar();
  const c = document.getElementById("content");
  if (tab === "mapa") {
    if (!mapPanelReady) {
      c.innerHTML = renderMapaControls();
      leafletMap = null;
      mapPanelReady = true;
    }
    attachHandlers();
    updateMapMarkers();
    return;
  }
  mapPanelReady = false;
  if (tab === "hoy") c.innerHTML = renderHoy();
  else if (tab === "fijas") c.innerHTML = renderFijas();
  else if (tab === "choferes") c.innerHTML = renderChoferes();
  else if (tab === "rutas") c.innerHTML = renderRutas();
  else if (tab === "historial") { c.innerHTML = renderHistorial(); loadHistorialTab(); }
  attachHandlers();
}

function attachHandlers() {
  const $ = (id) => document.getElementById(id);

  if (tab === "mapa") {
    $("load-day").onclick = () => cargarDia($("day-pick").value, $("turno-pick").value);
    if ($("all-filter")) {
      $("all-filter").oninput = (e) => {
        const q = e.target.value.toLowerCase();
        const sel = $("all-pick");
        Array.from(sel.options).forEach((opt, i) => {
          if (i === 0) return;
          opt.style.display = opt.textContent.toLowerCase().includes(q) ? "" : "none";
        });
      };
    }
    if ($("add-from-all")) {
      $("add-from-all").onclick = () => {
        const id = $("all-pick").value;
        if (id) addPickupFromFixed(id);
      };
    }
    $("m-add-pickup").onclick = () => {
      const nombre = $("m-nombre").value.trim();
      const direccion = $("m-direccion").value.trim();
      const zona = $("m-zona").value.trim();
      if (!nombre || !direccion) return;
      addPickup(nombre, direccion, zona, undefined, undefined, $("m-turno").value);
      $("m-nombre").value = ""; $("m-direccion").value = ""; $("m-zona").value = ""; $("m-turno").value = "";
    };
    if ($("assign-selected")) $("assign-selected").onclick = () => assignSelected($("assign-driver-select").value);
    if ($("clear-selection")) $("clear-selection").onclick = () => { selectedIds.clear(); updateMapMarkers(); };
    if ($("clear-map")) $("clear-map").onclick = clearToday;
    if ($("clear-assignments-map")) $("clear-assignments-map").onclick = clearAssignments;
    if ($("save-historial-map")) $("save-historial-map").onclick = guardarHistorialHoy;
  }

  if (tab === "hoy") {
    if ($("fixed-filter")) {
      $("fixed-filter").oninput = (e) => {
        const q = e.target.value.toLowerCase();
        const sel = $("fixed-pick");
        Array.from(sel.options).forEach((opt, i) => {
          if (i === 0) return;
          opt.style.display = opt.textContent.toLowerCase().includes(q) ? "" : "none";
        });
      };
    }
    if ($("add-from-fixed")) $("add-from-fixed").onclick = () => {
      const id = $("fixed-pick").value;
      if (id) addPickupFromFixed(id);
    };
    $("add-pickup").onclick = () => {
      const nombre = $("p-nombre").value.trim();
      const direccion = $("p-direccion").value.trim();
      const zona = $("p-zona").value.trim();
      if (!nombre || !direccion) return;
      addPickup(nombre, direccion, zona);
    };
    $("auto-assign").onclick = autoAssign;
    $("clear-today").onclick = clearToday;
    document.querySelectorAll(".driver-select").forEach((sel) => {
      sel.onchange = () => assignDriver(sel.dataset.id, sel.value);
    });
    document.querySelectorAll(".del-pickup").forEach((btn) => {
      btn.onclick = () => deletePickup(btn.dataset.id);
    });
  }

  if (tab === "fijas") {
    $("add-fixed").onclick = () => {
      const nombre = $("f-nombre").value.trim();
      const direccion = $("f-direccion").value.trim();
      if (!nombre || !direccion) return;
      const [lat, lng] = parseLatLng($("f-latlng").value);
      const { diasSemana, aPedido } = readDiasCheckboxes("f");
      addFixed(nombre, direccion, $("f-zona").value.trim(), $("f-horario").value.trim(), "", lat, lng, $("f-turno").value, diasSemana, aPedido);
    };
    document.querySelectorAll(".add-to-today").forEach((btn) => {
      btn.onclick = () => addPickupFromFixed(btn.dataset.id);
    });
    document.querySelectorAll(".edit-fixed").forEach((btn) => {
      btn.onclick = () => { editingFixedId = btn.dataset.id; render(); };
    });
    if ($("save-edit-fixed")) {
      $("save-edit-fixed").onclick = () => {
        const id = $("save-edit-fixed").dataset.id;
        const nombre = $("ef-nombre").value.trim();
        const direccion = $("ef-direccion").value.trim();
        if (!nombre || !direccion) return;
        const [lat, lng] = parseLatLng($("ef-latlng").value);
        const { diasSemana, aPedido } = readDiasCheckboxes("ef");
        updateFixed(id, {
          nombre, direccion,
          zona: $("ef-zona").value.trim(),
          horario: $("ef-horario").value.trim(),
          turno: $("ef-turno").value,
          diasSemana, aPedido,
          lat, lng,
        });
      };
    }
    if ($("cancel-edit-fixed")) {
      $("cancel-edit-fixed").onclick = () => { editingFixedId = null; render(); };
    }
    document.querySelectorAll(".del-fixed").forEach((btn) => {
      btn.onclick = () => deleteFixed(btn.dataset.id);
    });
  }

  if (tab === "rutas") {
    if ($("clear-assignments-rutas")) $("clear-assignments-rutas").onclick = clearAssignments;
    document.querySelectorAll(".print-route").forEach((btn) => {
      btn.onclick = () => printRoute(btn.dataset.driverId);
    });
    document.querySelectorAll(".print-all-routes").forEach((btn) => {
      btn.onclick = printAllRoutes;
    });
    document.querySelectorAll(".unassign-stop").forEach((btn) => {
      btn.onclick = () => unassignPickup(btn.dataset.id);
    });
  }

  if (tab === "choferes") {
    $("add-driver").onclick = () => {
      const nombre = $("d-nombre").value.trim();
      if (!nombre) return;
      addDriver(nombre);
    };
    document.querySelectorAll(".del-driver").forEach((btn) => {
      btn.onclick = () => deleteDriver(btn.dataset.id);
    });
  }
}

function exportarDatos() {
  const payload = {
    _tipo: "panel-retiros-export",
    _fecha: new Date().toISOString(),
    drivers: data.drivers,
    fixedAddresses: data.fixedAddresses,
    pickups: data.pickups,
    geocode: (function () { try { return JSON.parse(localStorage.getItem(GEOCODE_CACHE_KEY)) || {}; } catch (e) { return {}; } })(),
  };
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  const hoy = new Date().toISOString().slice(0, 10);
  a.href = url;
  a.download = `panel-retiros-datos-${hoy}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function importarDatos(file) {
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const payload = JSON.parse(e.target.result);
      if (!payload || !Array.isArray(payload.fixedAddresses)) {
        alert("El archivo no tiene el formato esperado.");
        return;
      }
      if (!confirm("Esto va a reemplazar todos los datos actuales (direcciones, choferes y retiros) por los del archivo. ¿Continuar?")) return;
      data = migrarTurnos({
        drivers: payload.drivers || [],
        fixedAddresses: payload.fixedAddresses || [],
        pickups: payload.pickups || [],
      });
      // importar también las ubicaciones ya calculadas, para que los pines aparezcan sin volver a buscar
      if (payload.geocode && typeof payload.geocode === "object") {
        try {
          const actual = JSON.parse(localStorage.getItem(GEOCODE_CACHE_KEY)) || {};
          const combinado = Object.assign({}, actual, payload.geocode);
          localStorage.setItem(GEOCODE_CACHE_KEY, JSON.stringify(combinado));
          geoCache = combinado;
        } catch (err) { /* ignorar */ }
      }
      save();
      render();
      alert("Datos importados correctamente.");
    } catch (err) {
      console.error(err);
      alert("No se pudo leer el archivo. ¿Es el archivo de datos exportado?");
    }
  };
  reader.readAsText(file);
}

document.getElementById("export-data").onclick = exportarDatos;
document.getElementById("import-data").onclick = () => document.getElementById("import-file").click();
document.getElementById("import-file").onchange = (e) => {
  if (e.target.files && e.target.files[0]) importarDatos(e.target.files[0]);
  e.target.value = "";
};

document.getElementById("today-date").textContent = new Date().toLocaleDateString("es-AR", { weekday: "long", day: "numeric", month: "long" });

// ---------- Autenticación / acceso ----------
const loginOverlay = document.getElementById("login-overlay");
const appWrap = document.getElementById("app-wrap");
let appStarted = false;

function startAppOnce() {
  if (appStarted) return;
  appStarted = true;
  initData();
}

function traducirErrorAuth(code) {
  switch (code) {
    case "auth/invalid-email": return "El email no es válido.";
    case "auth/user-not-found":
    case "auth/wrong-password":
    case "auth/invalid-credential": return "Email o contraseña incorrectos.";
    case "auth/too-many-requests": return "Demasiados intentos fallidos. Esperá un momento.";
    case "auth/network-request-failed": return "Sin conexión a internet.";
    default: return "No se pudo entrar. Reintentá.";
  }
}

if (!tryInitFirebase()) {
  // Firebase no configurado: sin login, modo local (respaldo)
  loginOverlay.style.display = "none";
  appWrap.style.display = "block";
  startAppOnce();
} else {
  auth.onAuthStateChanged((user) => {
    if (user) {
      loginOverlay.style.display = "none";
      appWrap.style.display = "block";
      startAppOnce();
    } else {
      loginOverlay.style.display = "flex";
      appWrap.style.display = "none";
    }
  });

  document.getElementById("login-form").addEventListener("submit", (e) => {
    e.preventDefault();
    const email = document.getElementById("login-email").value.trim();
    const pass = document.getElementById("login-pass").value;
    const errEl = document.getElementById("login-error");
    const btn = document.getElementById("login-btn");
    errEl.textContent = "";
    btn.disabled = true; btn.textContent = "Entrando...";
    auth.signInWithEmailAndPassword(email, pass)
      .catch((err) => { errEl.textContent = traducirErrorAuth(err.code); })
      .finally(() => { btn.disabled = false; btn.textContent = "Entrar"; });
  });

  document.getElementById("logout-btn").addEventListener("click", () => {
    if (confirm("¿Cerrar sesión en este dispositivo?")) auth.signOut();
  });
}
</script>
